<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>あみだくじ抽選</title>
<link rel="stylesheet" href="style.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>📏 あみだくじ抽選</h1>
      <p class="subtitle">運命の道をたどれ</p>
    </header>

    <section class="panel">
      <label for="entries" class="label">候補リスト（改行区切り）</label>
      <textarea id="entries" rows="5" placeholder="A&#10;B&#10;C&#10;D&#10;E"></textarea>
      <div class="row">
        <label class="count-label">当選数 <input type="number" id="winnerCount" value="1" min="1" max="100" /></label>
      </div>
      <button id="drawBtn" type="button" class="draw-btn">✦ START ✦</button>
      <p class="hint">Cmd / Ctrl + Enter でも抽選</p>
    </section>

    <section class="stage">
      <div class="board-wrap">
        <svg id="amida" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <ul id="winners" class="winners"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
